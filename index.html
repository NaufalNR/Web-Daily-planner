<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevDay — Daily Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #07070f;
  --surface: #0d0d1c;
  --card: #111120;
  --card-hover: #161628;
  --border: #1c1c30;
  --border-md: #252540;
  --border-lt: #303050;
  --accent: #7c6af7;
  --accent-dim: rgba(124,106,247,0.15);
  --teal: #26d9c7;
  --orange: #f07a4a;
  --rose: #e05a8a;
  --green: #3dd68c;
  --green-dim: rgba(61,214,140,0.13);
  --green-bright: rgba(61,214,140,0.22);
  --green-border: rgba(61,214,140,0.4);
  --indigo: #5b8af5;
  --text: #dcdcf0;
  --text-muted: #5e5e80;
  --text-faint: #2e2e4a;
  --font: 'Outfit', sans-serif;
  --r: 14px;
  --r-sm: 9px;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 820px; margin: 0 auto;
  padding: 0 1.5rem 6rem;
}

/* Header */
header {
  padding: 2.5rem 0 2rem;
  border-bottom: 1px solid var(--border);
  margin-bottom: 2rem;
}

.logo { display: flex; align-items: center; gap: 8px; margin-bottom: .9rem; }

.logo-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
  animation: blink 2.4s ease-in-out infinite;
}

@keyframes blink {
  0%,100% { opacity:1; transform:scale(1); }
  50% { opacity:.4; transform:scale(.7); }
}

.logo-text {
  font-size: 11px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase;
  color: var(--text-muted);
}

.header-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.9rem,5vw,2.8rem);
  font-weight: 600; line-height: 1.1; margin-bottom: .35rem;
}

.header-title em { font-style: italic; color: var(--accent); }
.header-date { font-size: 13px; color: var(--text-muted); }

.progress-wrap { margin-top: 1.4rem; display: flex; align-items: center; gap: 1rem; }

.progress-bg {
  flex: 1; height: 3px;
  background: var(--border-md); border-radius: 2px; overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--teal));
  border-radius: 2px;
  transition: width .6s cubic-bezier(.4,0,.2,1);
}

.progress-txt {
  font-size: 12px; color: var(--text-muted);
  white-space: nowrap; min-width: 55px; text-align: right;
}

/* Stats */
.stats-row {
  display: flex; gap: .85rem;
  margin-bottom: 2rem; flex-wrap: wrap;
}

.stat-card {
  flex: 1; min-width: 110px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: .9rem 1.1rem;
  transition: border-color .2s;
}
.stat-card:hover { border-color: var(--border-md); }

.stat-label {
  font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: .35rem;
}

.stat-value {
  font-size: 24px; font-weight: 700;
  color: var(--text); line-height: 1;
}
.stat-value small {
  font-size: 12px; font-weight: 400;
  color: var(--text-muted); margin-left: 2px;
}

/* Section head */
.section-head {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 1rem; gap: 1rem;
}

.section-title {
  font-size: 10px; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--text-muted);
}

.btn-add {
  display: flex; align-items: center; gap: 6px;
  padding: .42rem .95rem;
  border-radius: var(--r-sm);
  border: 1px solid rgba(124,106,247,.35);
  background: var(--accent-dim);
  color: var(--accent);
  font-family: var(--font); font-size: 13px; font-weight: 500;
  cursor: pointer; transition: all .2s;
}
.btn-add:hover {
  background: rgba(124,106,247,.25);
  border-color: var(--accent);
  transform: translateY(-1px);
}

/* Timeline */
.timeline {
  display: flex; flex-direction: column; gap: .55rem;
  position: relative;
}

.timeline::before {
  content: '';
  position: absolute;
  left: 52px; top: 28px; bottom: 28px;
  width: 1px;
  background: linear-gradient(to bottom, transparent, var(--border-md) 8%, var(--border-md) 92%, transparent);
}

.tl-item {
  display: flex; align-items: stretch;
  animation: slideIn .3s ease both;
}

@keyframes slideIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

.tl-time {
  width: 52px; flex-shrink: 0;
  display: flex; align-items: flex-start; justify-content: flex-end;
  padding-top: 1.25rem; padding-right: .75rem;
}

.tl-time-val {
  font-size: 11px; font-weight: 600;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
}

.tl-dot-col {
  flex-shrink: 0; width: 20px;
  display: flex; align-items: flex-start;
  justify-content: center; padding-top: 1.3rem;
}

.tl-dot {
  width: 10px; height: 10px; border-radius: 50%;
  border: 1.5px solid var(--border-lt);
  background: var(--bg);
  flex-shrink: 0;
  transition: all .35s cubic-bezier(.4,0,.2,1);
  position: relative; z-index: 1;
}

.tl-dot.done {
  background: var(--green);
  border-color: var(--green);
  box-shadow: 0 0 0 4px rgba(61,214,140,.18), 0 0 14px rgba(61,214,140,.3);
  transform: scale(1.25);
}

.tl-content {
  flex: 1; padding: 0 0 .55rem .75rem;
}

/* ── CARD ── */
.tl-card {
  background: var(--card);
  border: 1px solid var(--border-md);
  border-radius: var(--r);
  overflow: hidden;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  position: relative;
}

.tl-card:hover {
  background: var(--card-hover);
  border-color: var(--border-lt);
  transform: translateY(-1px);
}

/* left accent strip */
.card-bar {
  position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: var(--cat-color);
  border-radius: 3px 0 0 3px;
  transition: width .2s;
}
.tl-card:hover .card-bar { width: 4px; }

/* DONE CARD — bright green */
.tl-card.is-done {
  background: rgba(61,214,140,.05);
  border-color: var(--green-border);
}
.tl-card.is-done:hover {
  background: rgba(61,214,140,.08);
  border-color: rgba(61,214,140,.6);
}
.tl-card.is-done .card-bar { background: var(--green) !important; width: 4px; }

/* Card inner layout */
.card-inner {
  display: flex; align-items: center;
  gap: .9rem; padding: 1rem 1rem 1rem 1.2rem;
}

/* ── BIG CHECKBOX ── */
.card-check {
  flex-shrink: 0;
  width: 38px; height: 38px; border-radius: 50%;
  border: 2px solid var(--border-lt);
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  user-select: none;
}

.card-check:hover {
  border-color: var(--green);
  background: rgba(61,214,140,.1);
  transform: scale(1.1);
}

.card-check .ico-un { color: rgba(255,255,255,.12); }
.card-check .ico-ck { display: none; }

/* CHECKED STATE */
.card-check.checked {
  background: var(--green);
  border-color: transparent;
  box-shadow: 0 0 0 5px rgba(61,214,140,.2), 0 0 24px rgba(61,214,140,.45);
  transform: scale(1.08);
}

.card-check.checked .ico-un { display: none; }
.card-check.checked .ico-ck { display: block; color: #063020; }

.card-check.checked:hover { transform: scale(1.15); background: #5af0a8; }

/* Card body */
.card-body { flex: 1; min-width: 0; }

.card-top {
  display: flex; align-items: center;
  gap: .55rem; margin-bottom: .38rem; flex-wrap: wrap;
}

.card-name {
  font-size: 15px; font-weight: 600;
  color: var(--text); line-height: 1.25;
  flex: 1; min-width: 0;
  transition: color .25s;
}

/* Done name styling — stays bright, NOT dimmed */
.is-done .card-name {
  color: #a0edc6;
  text-decoration: line-through;
  text-decoration-color: rgba(61,214,140,.5);
  text-decoration-thickness: 2px;
}

/* Selesai badge */
.done-badge {
  display: none;
  align-items: center; gap: 3px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--green);
  background: rgba(61,214,140,.15);
  border: 1px solid rgba(61,214,140,.35);
  border-radius: 20px; padding: 2px 9px;
  white-space: nowrap;
  animation: popIn .3s cubic-bezier(.34,1.56,.64,1);
}

@keyframes popIn {
  from { opacity:0; transform:scale(.6); }
  to   { opacity:1; transform:scale(1); }
}

.done-badge.show { display: flex; }

/* Meta row */
.card-meta {
  display: flex; align-items: center;
  gap: .5rem; flex-wrap: wrap;
}

.cat-badge {
  font-size: 10.5px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  padding: 2px 9px; border-radius: 20px;
  background: var(--cat-bg);
  color: var(--cat-color);
  border: 1px solid var(--cat-border);
  white-space: nowrap; flex-shrink: 0;
}

.card-note {
  font-size: 12.5px; color: var(--text-muted);
  overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; flex: 1; min-width: 0;
}

.is-done .card-note { color: rgba(61,214,140,.4); }

.card-dur {
  font-size: 11px; font-weight: 500;
  color: var(--text-faint);
  white-space: nowrap; margin-left: auto; flex-shrink: 0;
}

.is-done .card-dur { color: rgba(61,214,140,.3); }

/* Action buttons */
.card-actions {
  display: flex; flex-direction: column;
  gap: 4px; flex-shrink: 0;
  opacity: 0; transition: opacity .18s;
}
.tl-card:hover .card-actions { opacity: 1; }

.act-btn {
  width: 28px; height: 28px; border-radius: 7px;
  border: 1px solid transparent;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: all .15s;
}
.act-btn:hover { background: var(--border-md); border-color: var(--border-lt); }
.act-btn.edit:hover { color: var(--accent); border-color: rgba(124,106,247,.4); }
.act-btn.del:hover  { color: var(--rose);   border-color: rgba(224,90,138,.4); }

/* Category vars */
[data-cat="morning"] { --cat-color:#f07a4a; --cat-bg:rgba(240,122,74,.12); --cat-border:rgba(240,122,74,.3); }
[data-cat="dev"]     { --cat-color:#a18eff; --cat-bg:rgba(161,142,255,.12); --cat-border:rgba(161,142,255,.3); }
[data-cat="break"]   { --cat-color:#26d9c7; --cat-bg:rgba(38,217,199,.12);  --cat-border:rgba(38,217,199,.3); }
[data-cat="health"]  { --cat-color:#3dd68c; --cat-bg:rgba(61,214,140,.1);   --cat-border:rgba(61,214,140,.3); }
[data-cat="evening"] { --cat-color:#5b8af5; --cat-bg:rgba(91,138,245,.12);  --cat-border:rgba(91,138,245,.3); }
[data-cat="other"]   { --cat-color:#e05a8a; --cat-bg:rgba(224,90,138,.12);  --cat-border:rgba(224,90,138,.3); }

/* Quote */
.quote-strip {
  margin-top: 2rem;
  padding: 1.2rem 1.4rem;
  background: var(--card);
  border: 1px solid var(--border-md);
  border-radius: var(--r);
  display: flex; gap: 1rem; align-items: center;
}

.quote-bar {
  width: 3px; height: 34px; border-radius: 2px;
  background: linear-gradient(to bottom, var(--accent), var(--teal));
  flex-shrink: 0;
}

.quote-body {
  font-family: 'Playfair Display', serif;
  font-size: 14px; font-style: italic;
  color: var(--text-muted); line-height: 1.55;
}

.quote-body strong {
  display: block; font-family: var(--font);
  font-style: normal; font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--text-faint); margin-top: .3rem;
}

/* Modal */
.modal-backdrop {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.75);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
  opacity: 0; pointer-events: none;
  transition: opacity .25s;
}
.modal-backdrop.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border-lt);
  border-radius: 18px;
  padding: 2rem;
  width: 100%; max-width: 460px;
  transform: translateY(20px) scale(.96);
  transition: transform .32s cubic-bezier(.34,1.56,.64,1);
}
.modal-backdrop.open .modal { transform: none; }

.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 1.4rem; }

.form-group { margin-bottom: 1.1rem; }

.form-label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: .09em; text-transform: uppercase;
  color: var(--text-muted); margin-bottom: .45rem;
}

.form-input {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border-md);
  border-radius: var(--r-sm);
  padding: .65rem .95rem;
  font-family: var(--font); font-size: 14px;
  color: var(--text); outline: none;
  transition: border-color .2s;
  -webkit-appearance: none;
}
.form-input:focus { border-color: var(--accent); }
.form-input option { background: #111; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

.modal-actions {
  display: flex; gap: .7rem;
  margin-top: 1.6rem; justify-content: flex-end;
}

.btn-cancel {
  padding: .58rem 1.2rem;
  border-radius: var(--r-sm);
  border: 1px solid var(--border-lt);
  background: transparent;
  color: var(--text-muted); font-family: var(--font);
  font-size: 13px; cursor: pointer; transition: all .15s;
}
.btn-cancel:hover { background: var(--border-md); color: var(--text); }

.btn-save {
  padding: .58rem 1.5rem;
  border-radius: var(--r-sm);
  border: none; background: var(--accent);
  color: #fff; font-family: var(--font);
  font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .15s, transform .15s;
}
.btn-save:hover { opacity: .88; transform: translateY(-1px); }

.empty { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 14px; }

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 3px; }
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">DevDay Planner</span>
  </div>
  <h1 class="header-title">Hari ini, <em id="day-name"></em></h1>
  <p class="header-date" id="full-date"></p>
  <div class="progress-wrap">
    <div class="progress-bg">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
    <span class="progress-txt" id="prog-txt">0 / 0</span>
  </div>
</header>

<div class="stats-row">
  <div class="stat-card">
    <div class="stat-label">Total</div>
    <div class="stat-value" id="s-total">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Selesai</div>
    <div class="stat-value" id="s-done" style="color:var(--green)">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Sisa</div>
    <div class="stat-value" id="s-remain">0</div>
  </div>
  <div class="stat-card">
    <div class="stat-label">Sesi Dev</div>
    <div class="stat-value" id="s-dev" style="color:var(--accent)">0 <small>sesi</small></div>
  </div>
</div>

<div class="section-head">
  <span class="section-title">Jadwal Hari Ini</span>
  <button class="btn-add" onclick="openModal()">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
      <path d="M6.5 1v11M1 6.5h11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
    </svg>
    Tambah Aktivitas
  </button>
</div>

<div class="timeline" id="timeline"></div>

<div class="quote-strip">
  <div class="quote-bar"></div>
  <div class="quote-body" id="quote"></div>
</div>

</div>

<!-- Modal -->
<div class="modal-backdrop" id="modal-bd" onclick="clickOut(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Tambah Aktivitas</div>
    <div class="form-group">
      <label class="form-label">Nama Aktivitas</label>
      <input class="form-input" id="f-name" type="text" placeholder="Contoh: Belajar React Hooks"/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Jam Mulai</label>
        <input class="form-input" id="f-time" type="time" value="09:00"/>
      </div>
      <div class="form-group">
        <label class="form-label">Durasi</label>
        <select class="form-input" id="f-dur">
          <option value="15 mnt">15 menit</option>
          <option value="30 mnt">30 menit</option>
          <option value="45 mnt">45 menit</option>
          <option value="1 jam">1 jam</option>
          <option value="1.5 jam" selected>1.5 jam</option>
          <option value="2 jam">2 jam</option>
          <option value="3 jam">3 jam</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Kategori</label>
      <select class="form-input" id="f-cat">
        <option value="morning">🌅 Morning Routine</option>
        <option value="dev">💻 Dev / Belajar</option>
        <option value="break">☕ Istirahat</option>
        <option value="health">🏃 Kesehatan</option>
        <option value="evening">🌙 Evening</option>
        <option value="other">✦ Lainnya</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Catatan (opsional)</label>
      <input class="form-input" id="f-note" type="text" placeholder="Detail singkat..."/>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Batal</button>
      <button class="btn-save" onclick="saveAct()">Simpan</button>
    </div>
  </div>
</div>

<script>
const CAT_LABEL = { morning:'Morning', dev:'Dev', break:'Break', health:'Health', evening:'Evening', other:'Other' };
const CAT_ICON  = { morning:'🌅', dev:'💻', break:'☕', health:'🏃', evening:'🌙', other:'✦' };

const QUOTES = [
  { t:"The only way to do great work is to love what you do.", a:"Steve Jobs" },
  { t:"First, solve the problem. Then, write the code.", a:"John Johnson" },
  { t:"Code is like humor. When you have to explain it, it's bad.", a:"Cory House" },
  { t:"Consistency is the foundation of all success.", a:"Anonymous" },
  { t:"Every expert was once a beginner. Keep going.", a:"Anonymous" },
  { t:"It's not about ideas. It's about making ideas happen.", a:"Scott Belsky" },
];

const DEFAULTS = [
  {id:1,  time:"05:00", name:"Bangun & Morning Ritual",      cat:"morning", note:"Minum air, stretching ringan",       dur:"30 mnt", done:false},
  {id:2,  time:"05:30", name:"Meditasi & Journaling",        cat:"morning", note:"5 menit meditasi + planning hari",   dur:"30 mnt", done:false},
  {id:3,  time:"06:00", name:"Olahraga",                     cat:"health",  note:"Push-up, plank, atau lari pagi",    dur:"45 mnt", done:false},
  {id:4,  time:"07:00", name:"Ice Bath / Cold Plunge",       cat:"health",  note:"2–3 menit untuk mental sharpness",  dur:"15 mnt", done:false},
  {id:5,  time:"07:30", name:"Mandi & Sarapan",              cat:"morning", note:"Makan bergizi, kurangi gula",       dur:"30 mnt", done:false},
  {id:6,  time:"08:00", name:"Deep Work: Frontend",          cat:"dev",     note:"HTML · CSS · JavaScript dasar",     dur:"2 jam",  done:false},
  {id:7,  time:"10:00", name:"Istirahat + Jalan Kaki",       cat:"break",   note:"Jauh dari layar, gerak badan",      dur:"15 mnt", done:false},
  {id:8,  time:"10:15", name:"Deep Work: Backend",           cat:"dev",     note:"Node.js · Express · REST API",      dur:"1.5 jam",done:false},
  {id:9,  time:"12:00", name:"Makan Siang & Istirahat",      cat:"break",   note:"Makan, tidur siang 20 mnt",        dur:"1 jam",  done:false},
  {id:10, time:"13:00", name:"Project Building",             cat:"dev",     note:"Bangun portfolio project nyata",    dur:"2 jam",  done:false},
  {id:11, time:"15:00", name:"Tutorial / Kursus",            cat:"dev",     note:"Udemy · freeCodeCamp · YouTube",   dur:"1.5 jam",done:false},
  {id:12, time:"16:30", name:"Review & Git Commit",          cat:"dev",     note:"Review kode, push ke GitHub",      dur:"30 mnt", done:false},
  {id:13, time:"17:00", name:"Olahraga Sore / Jalan",        cat:"health",  note:"Gerak ringan untuk reset otak",    dur:"45 mnt", done:false},
  {id:14, time:"18:00", name:"Makan Malam",                  cat:"break",   note:"Makan bersama keluarga",           dur:"45 mnt", done:false},
  {id:15, time:"19:00", name:"Membaca Tech / Artikel",       cat:"dev",     note:"MDN · Dev.to · Medium",            dur:"1 jam",  done:false},
  {id:16, time:"20:30", name:"Side Project / Personal",      cat:"dev",     note:"Eksplorasi teknologi baru",        dur:"1 jam",  done:false},
  {id:17, time:"21:30", name:"Wind Down",                    cat:"evening", note:"Jurnal harian, baca ringan",       dur:"30 mnt", done:false},
  {id:18, time:"22:00", name:"Tidur",                        cat:"evening", note:"Matikan layar, istirahat cukup",   dur:"30 mnt", done:false},
];

let acts=[], editId=null, nid=100;

function load() {
  try {
    const raw = localStorage.getItem('devday3');
    if (raw) { const p=JSON.parse(raw); acts=p.l||DEFAULTS; nid=p.n||100; }
    else acts = JSON.parse(JSON.stringify(DEFAULTS));
  } catch { acts = JSON.parse(JSON.stringify(DEFAULTS)); }
}

function save() {
  try { localStorage.setItem('devday3', JSON.stringify({l:acts,n:nid})); } catch{}
}

function initDate() {
  const D=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  const M=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  const now=new Date();
  document.getElementById('day-name').textContent=D[now.getDay()];
  document.getElementById('full-date').textContent=`${now.getDate()} ${M[now.getMonth()]} ${now.getFullYear()}`;
}

const CHECK_ICON = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none">
  <path d="M3 8l3.5 3.5L13 5" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

const UNCHECK_ICON = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none" style="opacity:.25">
  <path d="M2.5 7l3 3L11.5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
</svg>`;

function render() {
  const sorted = [...acts].sort((a,b)=>a.time.localeCompare(b.time));
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';

  if (!sorted.length) {
    tl.innerHTML='<div class="empty">Belum ada aktivitas. Tambahkan yang pertama!</div>';
    updateStats(0,0,0); return;
  }

  sorted.forEach((a, i) => {
    const el = document.createElement('div');
    el.className = 'tl-item';
    el.style.animationDelay = (i * 0.04) + 's';
    el.innerHTML = `
      <div class="tl-time"><span class="tl-time-val">${a.time}</span></div>
      <div class="tl-dot-col"><div class="tl-dot${a.done?' done':''}"></div></div>
      <div class="tl-content">
        <div class="tl-card${a.done?' is-done':''}" data-cat="${a.cat}">
          <div class="card-bar"></div>
          <div class="card-inner">

            <div class="card-check${a.done?' checked':''}" onclick="toggleDone(${a.id})"
                 title="${a.done?'Batal selesai':'Tandai selesai'}">
              <span class="ico-un">${UNCHECK_ICON}</span>
              <span class="ico-ck">${CHECK_ICON}</span>
            </div>

            <div class="card-body">
              <div class="card-top">
                <div class="card-name">${a.name}</div>
                <div class="done-badge${a.done?' show':''}">
                  <svg width="9" height="9" viewBox="0 0 9 9" fill="none">
                    <path d="M1.5 4.5l2 2L7.5 2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                  Selesai
                </div>
              </div>
              <div class="card-meta">
                <span class="cat-badge">${CAT_ICON[a.cat]} ${CAT_LABEL[a.cat]}</span>
                ${a.note?`<span class="card-note">${a.note}</span>`:''}
                <span class="card-dur">${a.dur}</span>
              </div>
            </div>

            <div class="card-actions">
              <button class="act-btn edit" onclick="openModal(${a.id})" title="Edit">
                <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                  <path d="M9.5 1.5l2 2L4 11H2v-2L9.5 1.5Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                </svg>
              </button>
              <button class="act-btn del" onclick="delAct(${a.id})" title="Hapus">
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                  <path d="M2 2l7 7M9 2l-7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </button>
            </div>

          </div>
        </div>
      </div>`;
    tl.appendChild(el);
  });

  const total=acts.length, done=acts.filter(a=>a.done).length, dev=acts.filter(a=>a.cat==='dev').length;
  updateStats(total,done,dev);
}

function updateStats(total,done,dev) {
  document.getElementById('s-total').textContent=total;
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-remain').textContent=total-done;
  document.getElementById('s-dev').innerHTML=dev+' <small>sesi</small>';
  const pct=total?Math.round((done/total)*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=`${done} / ${total}`;
}

function toggleDone(id) {
  const a=acts.find(a=>a.id===id);
  if(a){ a.done=!a.done; save(); render(); }
}

function delAct(id) {
  if(!confirm('Hapus aktivitas ini?')) return;
  acts=acts.filter(a=>a.id!==id); save(); render();
}

function openModal(id=null) {
  editId=id;
  if(id!==null) {
    const a=acts.find(a=>a.id===id); if(!a) return;
    document.getElementById('modal-title').textContent='Edit Aktivitas';
    document.getElementById('f-name').value=a.name;
    document.getElementById('f-time').value=a.time;
    document.getElementById('f-cat').value=a.cat;
    document.getElementById('f-note').value=a.note||'';
    document.getElementById('f-dur').value=a.dur;
  } else {
    document.getElementById('modal-title').textContent='Tambah Aktivitas';
    document.getElementById('f-name').value='';
    document.getElementById('f-time').value='09:00';
    document.getElementById('f-cat').value='dev';
    document.getElementById('f-note').value='';
    document.getElementById('f-dur').value='1 jam';
  }
  document.getElementById('modal-bd').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(),300);
}

function closeModal() {
  document.getElementById('modal-bd').classList.remove('open'); editId=null;
}

function clickOut(e) {
  if(e.target===document.getElementById('modal-bd')) closeModal();
}

function saveAct() {
  const name=document.getElementById('f-name').value.trim();
  if(!name){ document.getElementById('f-name').focus(); return; }
  const data={
    name, time:document.getElementById('f-time').value,
    cat:document.getElementById('f-cat').value,
    note:document.getElementById('f-note').value.trim(),
    dur:document.getElementById('f-dur').value,
  };
  if(editId!==null) {
    const idx=acts.findIndex(a=>a.id===editId);
    if(idx!==-1) acts[idx]={...acts[idx],...data};
  } else {
    acts.push({id:nid++,done:false,...data});
  }
  save(); render(); closeModal();
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter'&&document.getElementById('modal-bd').classList.contains('open')) saveAct();
});

const q=QUOTES[Math.floor(Math.random()*QUOTES.length)];
document.getElementById('quote').innerHTML=`"${q.t}" <strong>— ${q.a}</strong>`;

load(); initDate(); render();
</script>
</body>
</html>
